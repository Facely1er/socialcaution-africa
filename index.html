<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/socialcaution.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/socialcaution.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>SocialCaution Africa | Digital Trust, Scam Prevention &amp; Privacy Rights</title>
    <meta name="title" content="SocialCaution Africa | Digital Trust, Scam Prevention &amp; Privacy Rights" />
    <meta name="description" content="Country-aware digital safety, ScamShield Africa, privacy rights, and scam prevention for citizens, families, students, and small businesses across Africa." />
    <meta name="keywords" content="Africa digital safety, scam prevention, mobile money fraud, privacy rights, POPIA, data protection Africa, ScamShield, cyber hygiene" />
    <meta name="author" content="SocialCaution Africa" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://africa.socialcaution.com/" />
    <meta property="og:title" content="SocialCaution Africa" />
    <meta property="og:description" content="Digital trust, scam prevention, and privacy rights for African citizens, families, students, and small businesses." />
    <meta property="og:image" content="https://africa.socialcaution.com/socialcaution.png" />
    <meta property="og:site_name" content="SocialCaution Africa" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://africa.socialcaution.com/" />
    <meta property="twitter:title" content="SocialCaution Africa" />
    <meta property="twitter:description" content="Digital trust, scam prevention, and privacy rights for African citizens, families, students, and small businesses." />
    <meta property="twitter:image" content="https://africa.socialcaution.com/socialcaution.png" />
    
    <!-- Security Headers -->
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="credentialless" />
    <meta http-equiv="Cross-Origin-Resource-Policy" content="cross-origin" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- X-Frame-Options is set via HTTP headers in netlify.toml, not meta tag -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <!-- Permissions Policy - prevents camera/microphone access -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://africa.socialcaution.com/" />
    
    <!-- Resource Preloading for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="dns-prefetch" href="https://*.supabase.co" />
    <link rel="dns-prefetch" href="https://*.supabase.in" />
    
    <!-- Preload critical resources -->
    <!-- Note: Preload links for built assets are handled by Vite automatically -->
    
    <!-- Structured Data - Loaded externally for CSP compliance -->
    <script type="application/ld+json" src="/structured-data.json"></script>
  </head>

      </div>
    </noscript>

</html>
